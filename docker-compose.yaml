services:

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      # CPU (тестирование): ограничиваем параллелизм для экономии RAM
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        # CPU: ограничиваем память под текущую машину (8 ГБ RAM)
        # GPU: удалить блок limits целиком — VRAM управляется драйвером
        limits:
          memory: 5500m
        # GPU (NVIDIA): раскомментировать и удалить limits выше
        # reservations:
        #   devices:
        #     - driver: nvidia
        #       count: all
        #       capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Загружает модель при первом запуске. Повторные запуски — мгновенные (volume).
  ollama-init:
    image: ollama/ollama
    container_name: ollama_init
    restart: no
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-qwen2.5:7b}
    entrypoint: ["/bin/sh", "-c", "ollama pull ${LLM_MODEL_NAME:-qwen2.5:7b}"]
    volumes:
      - ollama_data:/root/.ollama

  api:
    build: .
    container_name: document_assistant
    restart: always
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - "8000:80"
    volumes:
      - ./uploads:/app/uploads
      - ./normative_base:/app/normative_base
      - ./examples:/app/examples
    environment:
      - LLM_BASE_URL=http://ollama:11434
      - MAX_WORKERS=2
      - TIMEOUT=300

volumes:
  ollama_data:
